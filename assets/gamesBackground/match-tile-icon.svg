<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="tileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#3b3a8f"/>
    </linearGradient>
    <linearGradient id="tileShine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="100" rx="18" fill="url(#bgGrad)"/>

  <!-- Connecting arc between tiles (match indicator) -->
  <path d="M 44 50 Q 60 30 76 50" fill="none" stroke="#ffd700" stroke-width="2.5" stroke-dasharray="3,3" opacity="0.7"/>
  <!-- Arrow tips -->
  <polygon points="76,50 70,44 72,52" fill="#ffd700" opacity="0.7"/>
  <polygon points="44,50 50,44 48,52" fill="#ffd700" opacity="0.7"/>

  <!-- LEFT TILE -->
  <g filter="url(#shadow)" transform="translate(10, 18)">
    <rect width="48" height="58" rx="10" fill="url(#tileGrad)"/>
    <rect width="48" height="58" rx="10" fill="url(#tileShine)"/>
    <!-- Tile border -->
    <rect width="48" height="58" rx="10" fill="none" stroke="#a09fff" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Star symbol -->
    <g transform="translate(24, 29)" filter="url(#glow)">
      <polygon points="0,-13 3,-4 13,-4 5,2 8,12 0,6 -8,12 -5,2 -13,-4 -3,-4" fill="url(#starGrad)"/>
    </g>
  </g>

  <!-- RIGHT TILE -->
  <g filter="url(#shadow)" transform="translate(62, 18)">
    <rect width="48" height="58" rx="10" fill="url(#tileGrad)"/>
    <rect width="48" height="58" rx="10" fill="url(#tileShine)"/>
    <!-- Tile border -->
    <rect width="48" height="58" rx="10" fill="none" stroke="#a09fff" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Same star symbol -->
    <g transform="translate(24, 29)" filter="url(#glow)">
      <polygon points="0,-13 3,-4 13,-4 5,2 8,12 0,6 -8,12 -5,2 -13,-4 -3,-4" fill="url(#starGrad)"/>
    </g>
  </g>

  <!-- Sparkles around match -->
  <g fill="#ffd700" opacity="0.8" font-size="8" font-family="serif">
    <text x="54" y="18">✦</text>
  </g>
  <circle cx="56" cy="52" r="2" fill="#ffd700" opacity="0.6"/>
  <circle cx="64" cy="48" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="52" cy="56" r="1.5" fill="#fff" opacity="0.4"/>
</svg>
